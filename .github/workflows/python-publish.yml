name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: cp${{ matrix.python-version == '3.11' && '311' || '312' }}-*
          CIBW_SKIP: "*-win32 *-musllinux*"
          CIBW_BEFORE_BUILD: pip install setuptools wheel Cython numpy
          CIBW_BUILD_VERBOSITY: 1
          CIBW_DEPENDENCY_VERSIONS: latest
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists-${{ matrix.os }}-${{ matrix.python-version }}
          path: ./wheelhouse/*.whl

  release-build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: pip install setuptools wheel Cython numpy
      - run: uv build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: release-dists-sdist
          path: dist/*.tar.gz

  pypi-publish:
    runs-on: ubuntu-latest
    needs: [release-build, release-build-sdist]
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          pattern: release-dists-*
          merge-multiple: true
          path: dist/
      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
